apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: java-demo
  template:
    metadata:
      labels:
        app: java-demo
    spec:
      containers:
        - name: java-container
          image: java-app-demo:v3 
          imagePullPolicy: Never  
          envFrom:
            - configMapRef:
                name: java-app-config
          ports:
            - containerPort: 8080