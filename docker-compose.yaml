version: '3.8'

services:
  # Thành phần 1: Cơ sở dữ liệu MySQL
  mysql-db:
    image: mysql:8.0
    container_name: demo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Thành phần 2: Ứng dụng Java Spring Boot
  java-app:
    build: . # Tự động gọi Dockerfile để build nếu chưa có image
    image: java-app-demo:v3
    container_name: demo-java-app
    depends_on:
      mysql-db:
        condition: service_healthy # Chỉ bật App khi DB đã sẵn sàng
    environment:
      - DB_HOST=mysql-db # Tên này phải khớp với tên service ở trên
      - DB_NAME=demo_db
      - DB_USER=root
      - DB_PASS=root
    ports:
      - "8080:8080"